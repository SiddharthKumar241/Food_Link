<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recievers Near Me</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            /* New background: A smooth gradient and a subtle texture for depth */
            background: linear-gradient(to bottom, #ff9a8b, #ff6a88, #d06a7d);
            background-size: 100% 100%;
            color: #333;
        }

        header {
            background-color: rgba(0, 0, 0, 0.6); /* Darker semi-transparent background */
            color: white;
            text-align: center;
            padding: 40px 0;
            border-bottom: 3px solid #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6); /* Subtle text shadow for better readability */
        }

        header h1 {
            font-size: 3em;
            margin: 0;
            font-weight: 600;
        }

        table {
            width: 85%;
            margin: 40px auto;
            border-collapse: collapse;
            background-color: rgba(255, 255, 255, 0.9); /* Soft white background */
            border-radius: 8px; /* Rounded corners for the table */
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            overflow: hidden; /* Round the corners of the table */
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th {
            background-color: #4CAF50;
            color: white;
            padding: 16px;
            text-align: left;
            font-size: 1.2em;
        }

        td {
            padding: 15px;
            text-align: left;
            font-size: 1.1em;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #d1e7d7; /* Subtle hover effect */
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            position: fixed;
            width: 100%;
            bottom: 0;
            font-size: 1.1em;
        }

        /* Button-like effect on hover for table rows */
        tr {
            transition: all 0.3s ease-in-out;
        }

        tr:hover {
            transform: scale(1.02); /* Slight scale effect */
            cursor: pointer;
        }

        /* Add responsive design for small screens */
        @media (max-width: 768px) {
            table {
                width: 95%;
            }
            header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>My Stylish Table</h1>
</header>

<main>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John Doe</td>
                <td>25</td>
                <td>New York</td>
            </tr>
            <tr>
                <td>Jane Smith</td>
                <td>30</td>
                <td>Los Angeles</td>
            </tr>
            <tr>
                <td>David Wilson</td>
                <td>28</td>
                <td>Chicago</td>
            </tr>
        </tbody>
    </table>
</main>

<footer>
    <p>&copy; 2025 My Website | All Rights Reserved</p>
</footer>

</body>
</html>
